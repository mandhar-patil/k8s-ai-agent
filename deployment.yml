# ─── Test Deployments for K8s Agent Testing ──────────────────────────────────
# Deploy with: kubectl apply -f test-deployments.yaml
# Delete with: kubectl delete -f test-deployments.yaml

---
# 1. Nginx - simple healthy web server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: nginx
  labels:
    app: nginx-demo
    env: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
        env: test
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo-svc
  namespace: nginx
spec:
  selector:
    app: nginx-demo
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

